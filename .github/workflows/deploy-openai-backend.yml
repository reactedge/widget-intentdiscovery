name: Deploy OpenAI Backend

on:
  push:
    tags:
      - "intent-discovery*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: reactedge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIDGET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -z "${{ secrets.WIDGET_SSH_HOST }}" ]; then
            echo "ERROR: WIDGET_SSH_HOST not set (environment secrets not visible)"
            exit 1
          fi

          ssh-keyscan -H "${{ secrets.WIDGET_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend via rsync
        run: |     
          rsync -avzr --delete \
            --chown=www-data:www-data \
            node-backend/ \
            ${{ secrets.WIDGET_SSH_USER }}@${{ secrets.WIDGET_SSH_HOST }}:/var/www/openai-express/

      - name: Install backend dependencies
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.WIDGET_SSH_USER }}@${{ secrets.WIDGET_SSH_HOST }} \
          "cd /var/www/openai-express && npm install --omit=dev"

      - name: Restart backend
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.WIDGET_SSH_USER }}@${{ secrets.WIDGET_SSH_HOST }} \
          "pm2 reload openai-express || pm2 start /var/www/openai-express/"