<svg width="1000" height="680" viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff"/>

    <!-- Header -->
    <text x="60" y="80" font-size="32" font-weight="bold" fill="#111">
        AI Intent Discovery Widget
    </text>
    <text x="60" y="115" font-size="18" fill="#555">
        Architectural Isolation Impact Matrix
    </text>

    <!-- Divider -->
    <line x1="60" y1="140" x2="940" y2="140" stroke="#e5e5e5"/>

    <!-- Column Headers -->
    <text x="60" y="180" font-size="16" font-weight="bold" fill="#333">
        Concern
    </text>
    <text x="350" y="180" font-size="16" font-weight="bold" fill="#333">
        If Embedded in Theme
    </text>
    <text x="650" y="180" font-size="16" font-weight="bold" fill="#333">
        When Isolated as Widget
    </text>

    <!-- Row 1 -->
    <text x="60" y="220" font-size="14" fill="#111">Intent logic coupling</text>
    <text x="350" y="220" font-size="14" fill="#444">Mixed with theme JS</text>
    <text x="650" y="220" font-size="14" fill="#444">Dedicated IntentEngine</text>

    <!-- Row 2 -->
    <text x="60" y="260" font-size="14" fill="#111">AI integration</text>
    <text x="350" y="260" font-size="14" fill="#444">Hard-coded endpoints</text>
    <text x="650" y="260" font-size="14" fill="#444">Pluggable intentApi integration</text>

    <!-- Row 3 -->
    <text x="60" y="300" font-size="14" fill="#111">State management</text>
    <text x="350" y="300" font-size="14" fill="#444">Global event side-effects</text>
    <text x="650" y="300" font-size="14" fill="#444">Scoped System provider</text>

    <!-- Row 4 -->
    <text x="60" y="340" font-size="14" fill="#111">Styling risk</text>
    <text x="350" y="340" font-size="14" fill="#444">Theme CSS interference</text>
    <text x="650" y="340" font-size="14" fill="#444">Scoped widget styles</text>

    <!-- Row 5 -->
    <text x="60" y="380" font-size="14" fill="#111">Deployment flexibility</text>
    <text x="350" y="380" font-size="14" fill="#444">Theme redeploy required</text>
    <text x="650" y="380" font-size="14" fill="#444">Independent release cycle</text>

    <!-- Row 6 -->
    <text x="60" y="420" font-size="14" fill="#111">Performance impact</text>
    <text x="350" y="420" font-size="14" fill="#444">Loaded on every page</text>
    <text x="650" y="420" font-size="14" fill="#444">Lazy-loaded per category</text>

    <!-- Divider -->
    <line x1="60" y1="470" x2="940" y2="470" stroke="#e5e5e5"/>

    <!-- Footer -->
    <text x="60" y="510" font-size="16" font-weight="bold" fill="#111">
        Primary Impact: Commerce intelligence decoupled from presentation layer
    </text>

    <text x="60" y="540" font-size="14" fill="#555">
        Result: Modular AI augmentation without theme instability
    </text>

</svg>