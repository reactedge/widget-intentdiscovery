<svg width="1000" height="560" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">

    <!-- Zones -->
    <rect x="0" y="0" width="500" height="560" fill="#f5f5f5"/>
    <rect x="500" y="0" width="500" height="560" fill="#eef6ff"/>

    <!-- Titles -->
    <text x="250" y="30" text-anchor="middle" font-size="18" font-weight="bold">Magento (Host)</text>
    <text x="750" y="30" text-anchor="middle" font-size="18" font-weight="bold">Widget</text>

    <!-- Magento UI -->
    <rect x="50" y="80" width="400" height="100" fill="white" stroke="#999"/>
    <text x="250" y="110" text-anchor="middle" font-size="13">User Interactions</text>
    <text x="250" y="130" text-anchor="middle" font-size="11">Clicks / Filters / PDP / Cart</text>

    <!-- Magento Adapter -->
    <rect x="50" y="220" width="400" height="120" fill="#fff3e0" stroke="#999"/>
    <text x="250" y="250" text-anchor="middle" font-size="13">Magento Event Adapter</text>
    <text x="250" y="270" text-anchor="middle" font-size="11">DOM → semantic events</text>

    <!-- Event Bus -->
    <rect x="350" y="380" width="300" height="120" fill="#fff8e1" stroke="#999"/>
    <text x="500" y="410" text-anchor="middle" font-size="13">Window Event Bus</text>

    <!-- Widget -->
    <rect x="600" y="80" width="350" height="120" fill="white" stroke="#999"/>
    <text x="775" y="110" text-anchor="middle" font-size="13">Widget (black box)</text>

    <!-- Magento → Adapter -->
    <line x1="250" y1="180" x2="250" y2="220" stroke="#333" marker-end="url(#arrow)"/>

    <!-- Adapter → Event Bus -->
    <line x1="250" y1="340" x2="420" y2="380" stroke="#333" marker-end="url(#arrow)"/>

    <!-- Event Bus → Widget -->
    <line x1="650" y1="380" x2="775" y2="200" stroke="#333" marker-end="url(#arrow)"/>

    <!-- Widget → Event Bus -->
    <line x1="775" y1="200" x2="650" y2="380" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowRed)"/>

    <!-- Event labels (INBOUND) -->
    <text x="300" y="360" font-size="11">reactedge:intent</text>
    <text x="300" y="375" font-size="10">{ type, payload }</text>

    <!-- Event types detail -->
    <text x="70" y="320" font-size="10">product_view { sku }</text>
    <text x="70" y="335" font-size="10">category_view { id }</text>
    <text x="70" y="350" font-size="10">filter_select { attribute, value </text>

    <!-- Magento control events -->
    <text x="70" y="400" font-size="10">reactedge:filter → toggle URL param</text>
    <text x="70" y="415" font-size="10">reactedge:syncfilters → apply multiple</text>

    <!-- OUTBOUND -->
    <text x="670" y="360" font-size="11" fill="#d32f2f">reactedge:recommendations</text>
    <text x="670" y="375" font-size="10" fill="#d32f2f">[{ sku, match, reason }]</text>

    <!-- Render target -->
    <rect x="50" y="460" width="400" height="70" fill="white" stroke="#999"/>
    <text x="250" y="490" text-anchor="middle" font-size="11">Magento Product DOM</text>
    <text x="250" y="510" text-anchor="middle" font-size="10">Badges injected</text>

    <!-- Event Bus → DOM -->
    <line x1="420" y1="440" x2="250" y2="460" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowRed)"/>

    <!-- Arrow defs -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
        </marker>
        <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#d32f2f"/>
        </marker>
    </defs>

</svg>